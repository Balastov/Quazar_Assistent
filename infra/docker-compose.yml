services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: quazar
      POSTGRES_PASSWORD: quazar
      POSTGRES_DB: quazar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quazar -d quazar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: quazar
      MINIO_ROOT_PASSWORD: quazarsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 quazar quazarsecret &&
      mc mb --ignore-existing local/quazar-files &&
      exit 0
      "

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://quazar:quazar@postgres:5432/quazar
      DATABASE_URL_SYNC: postgresql://quazar:quazar@postgres:5432/quazar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: quazar
      MINIO_SECRET_KEY: quazarsecret
      MINIO_BUCKET: quazar-files
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: celery -A workers.celery_app.app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://quazar:quazar@postgres:5432/quazar
      DATABASE_URL_SYNC: postgresql://quazar:quazar@postgres:5432/quazar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: quazar
      MINIO_SECRET_KEY: quazarsecret
      MINIO_BUCKET: quazar-files
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
